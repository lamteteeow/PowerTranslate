# To use this template for a new extension:
# 1. Copy this file to a new workflow file (e.g., update-winget.yml)
# 2. Update Environmental variables with your data:
# - GITHUB_REPO with your GitHub repo name
# - GITHUB_REPO with your github user name (e.g., chatasweetie)
# - EXTENSION_NAME with your extension name (e.g., CmdPalMyExtension)
# - YOUR_PACKAGE_IDENTITY_NAME_HERE with the AppxPackageIdentityName located in the <ExtensionName>.csproj


name: Update WinGet - PowerTranslate

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.0.2.0)'
        required: false
        type: string
      release_tag:
        description: 'Release tag (e.g., EXTENSION_NAME-v0.0.2.0)'
        required: false
        type: string

# Global constants: UPDATE THESE, example; EXTENSION_NAME: ${{ vars.EXTENSION_NAME || 'CmdPalMyExtension' }}
env:
  DISPLAY_NAME: ${{ vars.DISPLAY_NAME || 'PowerTranslate' }}
  EXTENSION_NAME: ${{ vars.EXTENSION_NAME || 'PowerTranslateExtension' }}
  GITHUB_USER_NAME: ${{ vars.GITHUB_USER_NAME || 'lamteteeow' }}
  GITHUB_REPO: ${{ vars.GITHUB_REPO || 'PowerTranslate' }}
  PACKAGE_IDENTIFIER: ${{ vars.PACKAGE_IDENTIFIER || 'lamteteeow.PowerTranslate' }}

jobs:
  update-winget:
    # Only run if this is a matching extension release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.name, 'PowerTranslate v')
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Get release info
        id: release
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            # Use provided inputs for manual trigger
            echo "VERSION=${{ inputs.version }}" >> $env:GITHUB_OUTPUT
            if ("${{ inputs.release_tag }}" -ne "") {
              echo "TAG=${{ inputs.release_tag }}" >> $env:GITHUB_OUTPUT
            } else {
              echo "TAG=v${{ inputs.version }}" >> $env:GITHUB_OUTPUT
            }
          } elseif ("${{ github.event_name }}" -eq "release") {
            # Extract from release event
            $version = "${{ github.event.release.tag_name }}" -replace '^v', ''
            echo "VERSION=$version" >> $env:GITHUB_OUTPUT
            echo "TAG=${{ github.event.release.tag_name }}" >> $env:GITHUB_OUTPUT
          } else {
            # Get latest release
            $latestRelease = gh release list --limit 1 --json tagName,name | ConvertFrom-Json | Where-Object { $_.name -like "${{ env.DISPLAY_NAME }} v*" }
            $version = $latestRelease.tagName -replace '^v', ''
            echo "VERSION=$version" >> $env:GITHUB_OUTPUT
            echo "TAG=$($latestRelease.tagName)" >> $env:GITHUB_OUTPUT
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install wingetcreate
        run: |
          iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Update WinGet manifest
        env:
          WINGET_CREATE_TOKEN: ${{ secrets.WINGET_CREATE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.release.outputs.VERSION }}"
          $tag = "${{ steps.release.outputs.TAG }}"
          $manifestDir = "manifests/l/lamteteeow/PowerTranslate/$version"
          
          # URL for x64 MSIX package
          $x64Url = "https://github.com/${{ env.GITHUB_USER_NAME }}/${{ env.GITHUB_REPO }}/releases/download/$tag/PowerTranslateExtension_${version}_x64.msix"
          $releaseNotesUrl = "https://github.com/${{ env.GITHUB_USER_NAME }}/${{ env.GITHUB_REPO }}/releases/tag/$tag"
          
          Write-Host "Updating WinGet manifest for version $version"
          Write-Host "x64 MSIX URL: $x64Url"
          Write-Host "Release notes URL: $releaseNotesUrl"

          $token = $env:WINGET_CREATE_TOKEN
          if ([string]::IsNullOrWhiteSpace($token)) {
            throw "Missing WINGET_CREATE_TOKEN secret. Add a PAT with winget-pkgs submit permissions to repository secrets."
          }

          if (Test-Path $manifestDir) {
            Write-Host "Submitting local manifests from: $manifestDir"
            .\wingetcreate.exe submit $manifestDir `
              --token $token `
              --replace $version `
              --prtitle "Update ${{ env.PACKAGE_IDENTIFIER }} to $version (mandatory update)"
            exit $LASTEXITCODE
          }
          
          # Fallback: update manifest from release URL when local manifests are unavailable
          .\wingetcreate.exe update ${{ env.PACKAGE_IDENTIFIER }} `
            --version $version `
            --urls "$x64Url|x64" `
            --release-notes-url $releaseNotesUrl `
            --token $token `
            --submit